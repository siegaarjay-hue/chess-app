<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Play chess against an AI opponent on your mobile device">
  <title>Chess</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-inner">
        <h1 class="app-title">Chess</h1>
        <div id="status" class="status-text">White to move</div>
      </div>
    </header>

    <div id="captured-top" class="captured-bar">
      <div class="captured-pieces" id="captured-black"></div>
      <div class="material-diff" id="diff-top"></div>
    </div>

    <div id="board-container">
      <div id="rank-labels-left" class="rank-labels"></div>
      <div id="board" class="board"></div>
      <div id="rank-labels-right" class="rank-labels"></div>
    </div>
    <div id="file-labels" class="file-labels"></div>

    <div id="captured-bottom" class="captured-bar">
      <div class="captured-pieces" id="captured-white"></div>
      <div class="material-diff" id="diff-bottom"></div>
    </div>

    <div id="controls" class="controls">
      <button id="btn-new" class="ctrl-btn" title="New Game">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span>New</span>
      </button>
      <button id="btn-undo" class="ctrl-btn" title="Undo Move">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        <span>Undo</span>
      </button>
      <button id="btn-flip" class="ctrl-btn" title="Flip Board">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <span>Flip</span>
      </button>
    </div>

    <div id="move-history-container" class="move-history-container">
      <div id="move-history" class="move-history"></div>
    </div>

    <div id="thinking-indicator" class="thinking hidden">
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
      <span>Thinking...</span>
    </div>
  </div>

  <!-- Promotion Modal -->
  <div id="promotion-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Promote Pawn</h2>
      <div id="promotion-choices" class="promotion-choices"></div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="gameover-modal" class="modal-overlay hidden">
    <div class="modal-content gameover-content">
      <h2 id="gameover-title">Game Over</h2>
      <p id="gameover-message"></p>
      <button id="gameover-newgame" class="modal-btn">New Game</button>
    </div>
  </div>

  <!-- Confirm New Game Modal -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-content confirm-content">
      <h2>New Game?</h2>
      <p>Current game will be lost.</p>
      <div class="confirm-buttons">
        <button id="confirm-yes" class="modal-btn">Yes</button>
        <button id="confirm-no" class="modal-btn modal-btn-secondary">No</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
